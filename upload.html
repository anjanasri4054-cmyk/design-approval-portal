<!DOCTYPE html>
<html>

<head>
<title>Upload Design</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Upload Design</h1>

<form id="uploadForm">

<input
type="text"
id="name"
placeholder="Name"
required
>

<input
type="email"
id="email"
placeholder="Email"
required
>

<textarea
id="notes"
placeholder="Notes">
</textarea>

<input
type="file"
id="designFile"
required
>

<button type="submit">
Submit Design
</button>

</form>

</div>
<footer class="footer">

<h2>DesignFlow</h2>

<p>
Professional Design Approval Management
</p>

<p>
© 2026 All Rights Reserved
</p>

</footer>

<script src="js/upload.js"></script>

</body>
</html>
