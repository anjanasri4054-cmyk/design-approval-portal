<!DOCTYPE html>
<html>

<head>
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Password"
>

<select id="role">

<option value="customer">
Customer
</option>

<option value="admin">
Admin
</option>

</select>

<button onclick="login()">
Login
</button>

</div>

<script src="js/auth.js"></script>

</body>
</html>
